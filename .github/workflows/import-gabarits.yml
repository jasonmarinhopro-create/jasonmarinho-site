name: Import Gabarits dans Supabase

on:
  workflow_dispatch:   # déclenchement manuel depuis GitHub

jobs:
  import:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jason-app

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: jason-app/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Lancer l'import des gabarits
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/import-gabarits.mjs
