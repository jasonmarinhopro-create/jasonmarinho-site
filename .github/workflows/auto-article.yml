name: Auto-article blog (Lun/Mer/Ven)

# ┌─ Planification : Lundi, Mercredi, Vendredi à 7h00 UTC (8h/9h Paris)
# └─ Déclenchement manuel possible via "Run workflow" sur GitHub Actions
on:
  schedule:
    - cron: '0 7 * * 1,3,5'
  workflow_dispatch:

# Droits d'écriture sur le repo pour pouvoir committer
permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ──────────────────────────────────────────────────────────────────────
      # Génération de l'article via Claude Code (token OAuth = inclus dans
      # ton abonnement Claude Code, pas d'appel à l'API payante).
      # ──────────────────────────────────────────────────────────────────────
      - name: Génération de l'article via Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
          timeout_minutes: "15"
          prompt: |
            Tu génères le prochain article du blog jasonmarinho.com — automatiquement, sans intervention humaine.

            ÉTAPES À EXÉCUTER (dans l'ordre, sans déviation) :

            1. Lis `scripts/articles-queue.json` et prends le PREMIER sujet de la liste `topics`.
               Mémorise son `id`, `title`, `categorySlug`.

            2. Lis 1 ou 2 fichiers existants dans `scripts/articles/` (par exemple `accueillir-famille-enfants-airbnb-equipement.mjs`) pour comprendre la structure exacte attendue.

            3. Lis `blog/articles-data.mjs` pour identifier 3 articles existants pertinents (idéalement de la même `categorySlug`) à mettre dans le champ `related`.

            4. Crée le fichier `scripts/articles/_auto_temp.mjs` avec `export default { ... }` contenant :
               - `slug` : kebab-case court (4-8 mots, sans accent), différent de tout dossier existant dans `blog/`
               - `title` : titre complet (peut être affiné depuis le titre indicatif de la queue)
               - `description` : meta description 140-155 caractères
               - `keywords` : 4-5 mots-clés séparés par virgule
               - `categorySlug` : exactement la valeur du sujet
               - `date` : "2026-05-03"
               - `readTime` : 5 à 9 (entier, selon la densité)
               - `lead` : 2-3 phrases d'accroche avec un chiffre ou stat percutant
               - `sections` : 5 à 6 sections avec `h2` numérotés ("1. ...", "2. ...") et `content` (tableau de blocs)
               - `related` : 3 articles depuis blog/articles-data.mjs au format `{ slug, label, categoryLabel }`

            5. Types de blocs autorisés dans `content` :
               - `{ type: 'p', text: '...' }` — paragraphe
               - `{ type: 'ul', items: ['...', '...'] }` — liste à puces (4 à 7 items)
               - `{ type: 'tip', text: '...' }` — encadré conseil
               - `{ type: 'cta', text: '...', button: 'Libellé', href: '/services' }` — appel à l'action (1 SEUL dans tout l'article)

            6. CONTRAINTES de rédaction :
               - Public : hôtes Airbnb français, débutants à intermédiaires
               - Ton : direct, concret, tutoiement, sans jargon inutile
               - 2 à 3 blocs `tip` au total dans l'article
               - Exactement 1 bloc `cta` dans tout l'article
               - Chaque section a 2 à 4 blocs

            7. Exécute : `node scripts/generate-article.mjs scripts/articles/_auto_temp.mjs`
               (ce script crée le HTML, met à jour blog/index.html, sitemap.xml et blog/articles-data.mjs).

            8. Supprime le fichier temporaire : `rm scripts/articles/_auto_temp.mjs`

            9. Retire le sujet traité (le PREMIER) de `scripts/articles-queue.json` en réécrivant le fichier (garde le format JSON propre, indenté avec 2 espaces).

            10. NE COMMITTE PAS et NE PUSHE PAS — l'étape suivante du workflow s'en charge.

            En cas d'erreur (queue vide, slug déjà existant, JSON invalide), arrête-toi proprement et explique le problème.

      # ──────────────────────────────────────────────────────────────────────
      # Commit + push : Vercel déploie automatiquement après le push sur main.
      # ──────────────────────────────────────────────────────────────────────
      - name: Commit et push sur main
        run: |
          git config user.name  "jason-blog-bot"
          git config user.email "bot@jasonmarinho.com"

          # Stager uniquement les fichiers attendus
          git add blog/ sitemap.xml scripts/articles-queue.json

          if git diff --cached --quiet; then
            echo "Aucun changement à committer (queue vide ou erreur en amont)."
            exit 0
          fi

          TODAY=$(date +'%Y-%m-%d')
          git commit -m "feat(blog): article auto du $TODAY"
          git push origin main
          echo "✓ Article publié et déployé."
