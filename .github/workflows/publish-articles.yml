name: 2. Publier les articles du jour

on:
  schedule:
    - cron: '0 7 * * *'  # chaque jour à 8h heure de Paris (7h UTC)
  workflow_dispatch:       # déclenchement manuel possible

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Générer les cartes blog
        run: node scripts/generate-blog.mjs

      - name: Commit et push si des articles ont été publiés
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/index.html
          git diff --cached --quiet || git commit -m "chore: publication automatique des articles du jour"
          git push
