# Publication automatique des articles de blog.
#
# Pourquoi : la Routine « Rédaction article » (lun/mer/ven 7h) ne peut pas
# pousser sur main — son travail atterrit sur une branche claude/* (avec ou
# SANS pull request selon les cas : constaté le 17/07, la branche
# claude/laughing-einstein-max8hh a été poussée sans PR). Les articles
# s'empilaient et finissaient en conflit (articles-data.mjs, blog/index.html,
# rss.xml, sitemap.xml sont modifiés par CHAQUE publication).
#
# Deux déclencheurs, même garde-fou :
#  - push sur claude/**  → merge DIRECT de la branche dans main (cas Routine)
#  - pull_request        → merge de la PR (cas où une PR existe déjà)
# Dans les deux cas, on ne merge QUE si TOUS les fichiers modifiés sont des
# fichiers de publication (blog/, scripts/articles/, rss.xml, sitemap.xml,
# queue actualités). Tout le reste est ignoré → revue humaine.
#
# NB : le merge est fait avec GITHUB_TOKEN — le déploiement Vercel part
# quand même (intégration Git Vercel, pas une Action).

name: Auto-merge articles blog

on:
  push:
    branches: ['claude/**']
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Cas Routine : branche poussée sans PR → merge direct dans main ──────
  automerge-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Vérifier que la branche ne touche que des fichiers d'article
        id: check
        run: |
          git fetch origin main --quiet
          FILES=$(git diff --name-only "origin/main...HEAD")
          echo "Fichiers modifiés vs main :"
          echo "$FILES"
          if [ -z "$FILES" ]; then
            echo "Rien à merger (branche au niveau de main)."
            echo "safe=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SAFE=true
          while IFS= read -r f; do
            case "$f" in
              blog/*|scripts/articles/*|rss.xml|sitemap.xml|data/actualites-queue/*) ;;
              *) SAFE=false; echo "→ Hors périmètre article : $f" ;;
            esac
          done <<< "$FILES"
          echo "safe=$SAFE" >> "$GITHUB_OUTPUT"

      - name: Merger la branche dans main
        if: steps.check.outputs.safe == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          if gh api "repos/${{ github.repository }}/merges" \
               -f base=main -f head="$BRANCH" \
               -f commit_message="Publication auto : $BRANCH (article de blog)"; then
            echo "Branche $BRANCH mergée dans main ✅"
            git push origin --delete "$BRANCH" || true
          else
            # Conflit probable (article publié entre-temps) : on ouvre une PR
            # pour que ce soit VISIBLE au lieu d'échouer en silence.
            gh pr create --repo "${{ github.repository }}" \
              --base main --head "$BRANCH" \
              --title "Article en conflit : $BRANCH" \
              --body "🤖 Merge automatique impossible (conflit avec un article publié entre-temps). Demande à Claude : « répare les conflits de cette PR »." \
              || true
            exit 1
          fi

  # ── Cas PR : une pull request existe → merge de la PR ───────────────────
  automerge-pr:
    if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'claude/') && github.event.pull_request.user.login == 'jasonmarinhopro-create'
    runs-on: ubuntu-latest
    steps:
      - name: Vérifier que la PR ne touche que des fichiers d'article
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILES=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --paginate --jq '.[].filename')
          echo "Fichiers modifiés :"
          echo "$FILES"
          SAFE=true
          while IFS= read -r f; do
            case "$f" in
              blog/*|scripts/articles/*|rss.xml|sitemap.xml|data/actualites-queue/*) ;;
              *) SAFE=false; echo "→ Hors périmètre article : $f" ;;
            esac
          done <<< "$FILES"
          echo "safe=$SAFE" >> "$GITHUB_OUTPUT"

      - name: Merger la PR
        if: steps.check.outputs.safe == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh pr merge "${{ github.event.pull_request.number }}" \
               --repo "${{ github.repository }}" \
               --squash --delete-branch; then
            echo "PR d'article mergée automatiquement ✅"
          else
            gh pr comment "${{ github.event.pull_request.number }}" \
              --repo "${{ github.repository }}" \
              --body "🤖 Auto-merge impossible (probablement un conflit avec un article publié entre-temps). Résous les conflits ou demande à Claude : « répare les conflits de la PR #${{ github.event.pull_request.number }} »."
            exit 1
          fi
