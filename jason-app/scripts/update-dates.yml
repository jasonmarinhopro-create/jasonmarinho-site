name: 1. Initialiser les dates de publication

on:
  workflow_dispatch: # déclenchement manuel une seule fois

jobs:
  update-dates:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Mettre à jour les dates dans les frontmatters
        run: node scripts/update-dates.mjs

      - name: Commit et push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/articles/
          git diff --cached --quiet || git commit -m "chore: initialisation des dates de publication SEO"
          git push
