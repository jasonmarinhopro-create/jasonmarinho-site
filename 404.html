<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable · Jason Marinho</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g:#004C3F;--gd:#003329;--y:#FFD56B;--w:#FDFCF9;--td:#0F1A0D;--tm:#3D5038;--tl:#7A8C77;--bd:rgba(0,76,63,.09)}
html,body{height:100%}
body{font-family:'Outfit',sans-serif;background:var(--w);color:var(--td);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(16px,5vw,60px);background:rgba(0,51,41,.97);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,213,107,.07)}
.n-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.n-brand{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:#fff;letter-spacing:-.2px}
.n-brand em{color:var(--y);font-style:italic;font-weight:300}
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px clamp(20px,5vw,40px) 60px}
.code{font-family:'Fraunces',serif;font-size:clamp(80px,15vw,140px);font-weight:400;color:var(--g);opacity:.12;line-height:1;margin-bottom:-20px;user-select:none}
h1{font-family:'Fraunces',serif;font-size:clamp(24px,4vw,38px);font-weight:400;color:var(--td);margin-bottom:14px;line-height:1.2}
h1 em{color:var(--g);font-style:italic;font-weight:300}
p{font-size:15px;font-weight:300;color:var(--tl);max-width:380px;line-height:1.7;margin-bottom:36px}
.actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn-p{background:var(--y);color:var(--gd);font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;padding:12px 22px;border-radius:10px;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
.btn-p:hover{background:#ffe08f;transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,213,107,.28)}
.btn-s{background:transparent;color:var(--tm);font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;padding:12px 22px;border-radius:10px;text-decoration:none;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--bd);transition:all .2s}
.btn-s:hover{border-color:rgba(0,76,63,.25);color:var(--g)}
footer{padding:20px clamp(16px,5vw,60px);display:flex;justify-content:center}
.ft-cp{font-size:12px;color:var(--tl);font-weight:300}
</style>
</head>
<body>

<nav>
  <a href="/" class="n-logo">
    <span class="n-brand">Jason <em>Marinho</em></span>
  </a>
  <a href="https://app.jasonmarinho.com" style="font-size:13px;font-weight:600;color:var(--y);text-decoration:none">Accéder à la plateforme →</a>
</nav>

<main>
  <div class="code">404</div>
  <h1>Page <em>introuvable</em></h1>
  <p>Cette page n'existe pas ou a été déplacée. Pas de panique, retourne à l'accueil.</p>
  <div class="actions">
    <a href="/" class="btn-p"><i class="ph-bold ph-house"></i> Retour à l'accueil</a>
    <a href="https://app.jasonmarinho.com" class="btn-s"><i class="ph-bold ph-arrow-right"></i> Accéder à la plateforme</a>
  </div>
</main>

<footer>
  <span class="ft-cp">© 2025 Jason Marinho</span>
</footer>

</body>
</html>
