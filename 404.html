<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable · Jason Marinho</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g:#004C3F;--gd:#003329;--y:#FFD56B}
html,body{height:100%}
body{
  font-family:'Outfit',sans-serif;
  background:var(--gd);
  color:#f0f4ff;
  min-height:100svh;
  display:flex;align-items:center;justify-content:center;
  padding:24px 16px;
  position:relative;overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* Gradient blobs */
.bg1{position:fixed;top:-15%;left:50%;transform:translateX(-50%);width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(0,76,63,.18) 0%,transparent 60%);pointer-events:none}
.bg2{position:fixed;bottom:-20%;right:-10%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(255,213,107,.05) 0%,transparent 60%);pointer-events:none}
.bg3{position:fixed;top:30%;left:-10%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(0,90,74,.1) 0%,transparent 60%);pointer-events:none}

/* Card */
.card{
  text-align:center;position:relative;z-index:2;
  max-width:460px;width:100%;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  animation:fu .6s ease both;
}
@keyframes fu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

/* Compass icon */
.icon-wrap{
  width:80px;height:80px;border-radius:20px;
  background:rgba(0,76,63,.3);border:1px solid rgba(255,213,107,.15);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:8px;
}
.icon-wrap i{font-size:48px;color:var(--y);opacity:.9}

/* 404 ghost number */
.code{
  font-family:'Fraunces',serif;font-size:72px;font-weight:300;
  color:rgba(240,244,255,.06);letter-spacing:12px;line-height:1;
  margin-bottom:-16px;
}

h1{
  font-family:'Fraunces',serif;font-size:clamp(24px,4vw,36px);
  font-weight:400;color:#f0f4ff;line-height:1.25;
}
h1 em{color:var(--y);font-style:italic;font-weight:300}

p.desc{
  font-size:15px;font-weight:300;
  color:rgba(240,244,255,.45);
  line-height:1.65;max-width:360px;
}

/* Waves decoration */
.waves{display:flex;gap:6px;align-items:center;margin:8px 0}
.waves i:nth-child(1){font-size:20px;color:rgba(255,213,107,.3)}
.waves i:nth-child(2){font-size:20px;color:rgba(255,213,107,.15)}
.waves i:nth-child(3){font-size:20px;color:rgba(255,213,107,.07)}

/* Button */
.btn{
  margin-top:12px;
  background:var(--y);color:var(--gd);
  font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;
  padding:13px 24px;border-radius:10px;text-decoration:none;
  display:inline-flex;align-items:center;gap:7px;
  transition:all .2s;
}
.btn:hover{background:#ffe08f;transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,213,107,.28)}

.hint{font-size:13px;color:rgba(240,244,255,.3)}
.hint a{color:var(--y);text-decoration:none;font-weight:500}
.hint a:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="bg1"></div>
<div class="bg2"></div>
<div class="bg3"></div>

<div class="card">
  <div class="icon-wrap">
    <i class="ph-thin ph-compass"></i>
  </div>

  <p class="code">4 0 4</p>

  <h1>Vous êtes <em>perdus en mer</em></h1>
  <p class="desc">Cette page a été emportée par les vagues. Le cap que vous cherchez n'existe pas (ou n'existe plus).</p>

  <div class="waves">
    <i class="ph-regular ph-waves"></i>
    <i class="ph-regular ph-waves"></i>
    <i class="ph-regular ph-waves"></i>
  </div>

  <a href="/" class="btn">
    <i class="ph-bold ph-arrow-left"></i> Regagner le port
  </a>

  <p class="hint">ou <a href="https://app.jasonmarinho.com">accéder à la plateforme</a></p>
</div>

</body>
</html>
